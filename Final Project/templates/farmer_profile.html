{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-user-circle"></i> {{ t["farmer_profile"] }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" id="farmerProfileForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="name" class="form-label">{{ t["full_name"] }} *</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="state" class="form-label">{{ t["state"] }} *</label>
                                    <select class="form-select" id="state" name="state" required>
                                        <option value="">{{ t["select_state"] }}</option>
                                        <option value="Maharashtra">Maharashtra</option>
                                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                                        <option value="Rajasthan">Rajasthan</option>
                                        <option value="Gujarat">Gujarat</option>
                                        <option value="Karnataka">Karnataka</option>
                                        <option value="Punjab">Punjab</option>
                                        <option value="Haryana">Haryana</option>
                                        <option value="West Bengal">West Bengal</option>
                                        <option value="Bihar">Bihar</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="district" class="form-label">{{ t["district"] }} *</label>
                                    <input type="text" class="form-control" id="district" name="district" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="crop_type" class="form-label">{{ t["crop_type"] }} *</label>
                                    <select class="form-select" id="crop_type" name="crop_type" required>
                                        <option value="">{{ t["select_crop"] }}</option>
                                        <option value="wheat">Wheat</option>
                                        <option value="rice">Rice</option>
                                        <option value="cotton">Cotton</option>
                                        <option value="sugarcane">Sugarcane</option>
                                        <option value="maize">Maize</option>
                                        <option value="pulses">Pulses</option>
                                        <option value="vegetables">Vegetables</option>
                                        <option value="fruits">Fruits</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="land_size" class="form-label">{{ t["land_size"] }} ({{ t["acres"] }}) *</label>
                                    <input type="number" class="form-control" id="land_size" name="land_size" step="0.1" min="0.1" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="irrigation_type" class="form-label">{{ t["irrigation_type"] }} *</label>
                                    <select class="form-select" id="irrigation_type" name="irrigation_type" required>
                                        <option value="">{{ t["select_irrigation"] }}</option>
                                        <option value="canal">Canal</option>
                                        <option value="well">Well</option>
                                        <option value="borewell">Borewell</option>
                                        <option value="drip">Drip Irrigation</option>
                                        <option value="sprinkler">Sprinkler</option>
                                        <option value="rainfed">Rainfed</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="annual_income" class="form-label">{{ t["annual_income"] }} (₹) *</label>
                                    <input type="number" class="form-control" id="annual_income" name="annual_income" step="10000" min="0" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="crop_damage" class="form-label">{{ t["crop_damage"] }} *</label>
                                    <select class="form-select" id="crop_damage" name="crop_damage" required>
                                        <option value="">{{ t["select_option"] }}</option>
                                        <option value="yes">{{ t["yes"] }}</option>
                                        <option value="no">{{ t["no"] }}</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">{{ t["need_types"] }} ({{ t["multiple_select"] }}) *</label>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_insurance" name="need_types" value="insurance">
                                        <label class="form-check-label" for="need_insurance">
                                            <i class="fas fa-shield-alt"></i> {{ t["insurance"] }}
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_loan" name="need_types" value="loan">
                                        <label class="form-check-label" for="need_loan">
                                            <i class="fas fa-money-bill-wave"></i> {{ t["loan"] }}
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_subsidy" name="need_types" value="subsidy">
                                        <label class="form-check-label" for="need_subsidy">
                                            <i class="fas fa-percentage"></i> {{ t["subsidy"] }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_water" name="need_types" value="water">
                                        <label class="form-check-label" for="need_water">
                                            <i class="fas fa-tint"></i> {{ t["water_problem"] }}
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_disaster" name="need_types" value="disaster">
                                        <label class="form-check-label" for="need_disaster">
                                            <i class="fas fa-exclamation-triangle"></i> {{ t["disaster_relief"] }}
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_equipment" name="need_types" value="equipment">
                                        <label class="form-check-label" for="need_equipment">
                                            <i class="fas fa-tractor"></i> {{ t["equipment"] }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="need_livestock" name="need_types" value="livestock">
                                        <label class="form-check-label" for="need_livestock">
                                            <i class="fas fa-cow"></i> {{ t["livestock"] }}
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-save"></i> {{ t["save_profile"] }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('farmerProfileForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Get selected need types
    const needTypes = [];
    document.querySelectorAll('input[name="need_types"]:checked').forEach(checkbox => {
        needTypes.push(checkbox.value);
    });
    
    if (needTypes.length === 0) {
        alert('{{ t["select_at_least_one_need"] }}');
        return;
    }
    
    // Save profile to localStorage
    const profileData = {
        name: document.getElementById('name').value,
        state: document.getElementById('state').value,
        district: document.getElementById('district').value,
        crop_type: document.getElementById('crop_type').value,
        land_size: document.getElementById('land_size').value,
        irrigation_type: document.getElementById('irrigation_type').value,
        annual_income: document.getElementById('annual_income').value,
        crop_damage: document.getElementById('crop_damage').value,
        need_types: needTypes
    };
    
    localStorage.setItem('farmerProfile', JSON.stringify(profileData));
    
    // Redirect to dashboard
    window.location.href = '{{ url_for("dashboard") }}';
});
</script>
{% endblock %}
